name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── Job 1: Test matrix across OS × Java versions ──────────────────────────
  test:
    name: Test (Java ${{ matrix.java }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        java: [ 17, 21 ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      # JavaFX needs a display on Linux — spin up a virtual framebuffer
      - name: Start virtual display (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run tests
        run: mvn test -B
        env:
          DISPLAY: ${{ runner.os == 'Linux' && ':99' || '' }}

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Tests — Java ${{ matrix.java }} on ${{ matrix.os }}
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ matrix.os }}-java${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7

  # ── Job 2: Coverage report (Linux / Java 17 only) ─────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Start virtual display
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # Run tests + generate JaCoCo XML in one pass
      - name: Run tests with coverage
        run: mvn test jacoco:report -B
        env:
          DISPLAY: ':99'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  # ── Job 3: Build JAR (Linux / Java 17 only, after tests pass) ─────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Package JAR (skip tests — already ran in test job)
        run: mvn package -B -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: exifcleaner-jar
          path: target/exifcleaner-*.jar
          retention-days: 30

  # ── Job 4: Static analysis (on-demand, non-blocking) ──────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test
    # Run but never block the pipeline on quality findings
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Run SpotBugs
        run: mvn spotbugs:spotbugs -B -Dspotbugs.skip=false
        continue-on-error: true

      - name: Run PMD
        run: mvn pmd:pmd -B -Dpmd.skip=false
        continue-on-error: true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 7

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: target/pmd.xml
          retention-days: 7

  # ── Job 5: Security scan (weekly schedule + manual trigger) ───────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Run OWASP Dependency Check
        run: mvn dependency-check:check -B -Ddependency-check.skip=false
        continue-on-error: true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check-report.html
          retention-days: 30
