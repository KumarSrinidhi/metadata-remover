name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17, 21 ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      # JavaFX requires a display even in headless test mode
      - name: Start virtual display
        run: |
          sudo apt-get install -y xvfb --quiet
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run unit tests
        run: mvn test -B
        env:
          DISPLAY: ':99'

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests — Java ${{ matrix.java }}
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7

  # Summary job — PRs and branch protections can require this single job
  # instead of listing every matrix combination
  tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All test jobs passed."
