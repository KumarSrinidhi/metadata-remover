version: 2
updates:
  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "KumarSrinidhi"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group updates for better PR management
    groups:
      javafx:
        patterns:
          - "org.openjfx:*"
      testing:
        patterns:
          - "org.junit.jupiter:*"
          - "org.mockito:*"
      logging:
        patterns:
          - "org.slf4j:*"
          - "ch.qos.logback:*"
      apache:
        patterns:
          - "org.apache.*:*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
